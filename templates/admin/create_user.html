{% extends "base.html" %}
{% block title %}Create User - QuizGenie{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <nav aria-label="breadcrumb" class="mb-3">
      <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="/admin/users">Users</a></li>
        <li class="breadcrumb-item active">New User</li>
      </ol>
    </nav>
    <h1 class="h3 mb-4">
      <i class="bi bi-person-plus me-2 text-primary"></i>Create New User
    </h1>

    {% if error %}
    <div class="alert alert-danger">
      <i class="bi bi-exclamation-circle me-2"></i>{{ error }}
    </div>
    {% endif %}

    <div class="card shadow-sm">
      <div class="card-body p-4">
        <form method="post" action="/admin/users/new" novalidate>
          <div class="mb-3">
            <label class="form-label fw-semibold" for="username">
              Username <span class="text-danger">*</span>
            </label>
            <input type="text" class="form-control" id="username" name="username"
                   autocomplete="off" autofocus required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold" for="password">
              Password <span class="text-danger">*</span>
            </label>
            <input type="password" class="form-control" id="password" name="password"
                   autocomplete="new-password" required minlength="8">
            <div class="form-text">Minimum 8 characters.</div>
          </div>
          <div class="mb-4">
            <div class="form-check">
              <input type="checkbox" class="form-check-input" id="is_admin"
                     name="is_admin" value="on">
              <label class="form-check-label fw-semibold" for="is_admin">
                Admin user
              </label>
              <div class="form-text">Admin users can manage other users.</div>
            </div>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-person-plus me-1"></i>Create User
            </button>
            <a href="/admin/users" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
