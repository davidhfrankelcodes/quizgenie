{% extends "base.html" %}
{% block title %}Change Password - QuizGenie{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <h1 class="h3 mb-4"><i class="bi bi-key me-2 text-primary"></i>Change Password</h1>

    {% if error %}
    <div class="alert alert-danger">
      <i class="bi bi-exclamation-circle me-2"></i>{{ error }}
    </div>
    {% endif %}

    <div class="card shadow-sm">
      <div class="card-body p-4">
        <form method="post" action="/change-password" novalidate>
          <div class="mb-3">
            <label class="form-label fw-semibold" for="current_password">Current Password</label>
            <input type="password" class="form-control" id="current_password"
                   name="current_password" autocomplete="current-password" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold" for="new_password">New Password</label>
            <input type="password" class="form-control" id="new_password"
                   name="new_password" autocomplete="new-password" required minlength="8">
            <div class="form-text">Minimum 8 characters.</div>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold" for="confirm_password">Confirm New Password</label>
            <input type="password" class="form-control" id="confirm_password"
                   name="confirm_password" autocomplete="new-password" required>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-check-lg me-1"></i>Update Password
            </button>
            <a href="/dashboard" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
